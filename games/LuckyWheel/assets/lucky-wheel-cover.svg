<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Lucky Wheel Cover</title>
  <desc id="desc">Colorful party wheel cover art for Lucky Wheel.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120b2f"/>
      <stop offset="50%" stop-color="#1b4f8f"/>
      <stop offset="100%" stop-color="#10202d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcf59"/>
      <stop offset="50%" stop-color="#ff7f6e"/>
      <stop offset="100%" stop-color="#68e6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1360" cy="160" r="110" fill="#ffcf59" opacity="0.16"/>
  <circle cx="220" cy="760" r="150" fill="#68e6ff" opacity="0.14"/>
  <g filter="url(#shadow)">
    <circle cx="1140" cy="470" r="238" fill="#0f1322" stroke="url(#glow)" stroke-width="16"/>
    <g transform="translate(1140 470)">
      <path d="M0 0 L0 -214 A214 214 0 0 1 125 -173 Z" fill="#ffcf59"/>
      <path d="M0 0 L125 -173 A214 214 0 0 1 204 -42 Z" fill="#ff7f6e"/>
      <path d="M0 0 L204 -42 A214 214 0 0 1 189 102 Z" fill="#6be4ff"/>
      <path d="M0 0 L189 102 A214 214 0 0 1 87 195 Z" fill="#8eff9a"/>
      <path d="M0 0 L87 195 A214 214 0 0 1 -54 207 Z" fill="#ffb85b"/>
      <path d="M0 0 L-54 207 A214 214 0 0 1 -171 129 Z" fill="#ff7fd0"/>
      <path d="M0 0 L-171 129 A214 214 0 0 1 -214 -1 Z" fill="#8f95ff"/>
      <path d="M0 0 L-214 -1 A214 214 0 0 1 -157 -145 Z" fill="#68e6ff"/>
      <path d="M0 0 L-157 -145 A214 214 0 0 1 -20 -213 Z" fill="#ffc766"/>
      <path d="M0 0 L-20 -213 A214 214 0 0 1 0 -214 Z" fill="#ff6e84"/>
      <circle r="84" fill="#fff7e5"/>
      <circle r="64" fill="#1a2040"/>
      <text x="0" y="12" fill="#fff7e5" font-size="26" text-anchor="middle" font-family="Segoe UI, sans-serif" font-weight="800">ტრიალი</text>
    </g>
    <path d="M1140 190 L1182 254 L1098 254 Z" fill="#fff7e5"/>
  </g>
  <g font-family="Segoe UI, sans-serif">
    <text x="120" y="220" fill="#68e6ff" font-size="34" font-weight="700" letter-spacing="3">ქართული წვეულების თამაში</text>
    <text x="120" y="360" fill="#fff7e5" font-size="112" font-weight="900">Lucky</text>
    <text x="120" y="474" fill="#ffcf59" font-size="112" font-weight="900">Wheel</text>
    <text x="120" y="574" fill="#d9e7f7" font-size="42" font-weight="600">შეიყვანე მოთამაშეები, დაატრიალე ბორბალი და ნახე</text>
    <text x="120" y="630" fill="#d9e7f7" font-size="42" font-weight="600">რომელი ნივთი ამოვარდება ამჯერად.</text>
    <g transform="translate(120 700)">
      <rect width="210" height="72" rx="36" fill="#ffcf59"/>
      <text x="105" y="46" fill="#111521" font-size="32" font-weight="800" text-anchor="middle">50 ნივთი</text>
    </g>
    <g transform="translate(350 700)">
      <rect width="250" height="72" rx="36" fill="#68e6ff"/>
      <text x="125" y="46" fill="#111521" font-size="32" font-weight="800" text-anchor="middle">მოთამაშეები ქვემოთ</text>
    </g>
  </g>
</svg>
