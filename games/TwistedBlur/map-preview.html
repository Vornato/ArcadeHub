<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TwistedBlur Map Preview</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #04070d;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      canvas {
        width: 1600px;
        height: 900px;
        display: block;
        background: #04070d;
      }
    </style>
  </head>
  <body>
    <canvas id="mapPreviewCanvas" width="1600" height="900" aria-label="TwistedBlur map preview"></canvas>
    <script type="module" src="./src/mapPreviewPage.js"></script>
  </body>
</html>
